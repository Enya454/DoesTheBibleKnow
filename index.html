<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask The Bible</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    background: #0a1628;
    color: #f5e9c8;
    overflow-x: hidden;
    padding: 0;
    position: relative;
  }

  .sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, #fffbe0 0%, #f5d76e 8%, #e8a030 18%, #b05a10 30%, #5a1a40 48%, #1a0a2e 65%, #0a1628 100%);
  }

  .clouds {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 220px;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,245,200,0.18);
    filter: blur(28px);
    animation: drift linear infinite;
  }
  .cloud:nth-child(1) { width:320px; height:80px; top:30px; left:-10%; animation-duration:38s; animation-delay:-5s; }
  .cloud:nth-child(2) { width:220px; height:55px; top:60px; left:20%; animation-duration:52s; animation-delay:-20s; background: rgba(255,240,180,0.12);}
  .cloud:nth-child(3) { width:400px; height:90px; top:15px; left:50%; animation-duration:44s; animation-delay:-12s; }
  .cloud:nth-child(4) { width:180px; height:45px; top:80px; left:70%; animation-duration:60s; animation-delay:-35s; background: rgba(255,255,220,0.10);}
  .cloud:nth-child(5) { width:280px; height:65px; top:40px; left:85%; animation-duration:47s; animation-delay:-8s; }
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-120vw); } }

  .rays {
    position: fixed;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 200vw;
    height: 120vh;
    z-index: 2;
    pointer-events: none;
  }
  .ray {
    position: absolute;
    top: 0;
    left: 50%;
    width: 80px;
    height: 100%;
    transform-origin: top center;
    animation: rayPulse ease-in-out infinite alternate;
  }
  .ray::before {
    content: '';
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(255,240,150,0.22) 0%, rgba(255,220,100,0.06) 40%, transparent 100%);
    clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
  }
  .ray:nth-child(1)  { transform: rotate(-52deg); width:60px;  animation-duration:4.1s; animation-delay:0s; }
  .ray:nth-child(2)  { transform: rotate(-42deg); width:90px;  animation-duration:5.3s; animation-delay:-1s; }
  .ray:nth-child(3)  { transform: rotate(-30deg); width:70px;  animation-duration:3.8s; animation-delay:-2s; }
  .ray:nth-child(4)  { transform: rotate(-18deg); width:110px; animation-duration:6.2s; animation-delay:-0.5s; }
  .ray:nth-child(5)  { transform: rotate(-8deg);  width:80px;  animation-duration:4.7s; animation-delay:-3s; }
  .ray:nth-child(6)  { transform: rotate(0deg);   width:120px; animation-duration:5.8s; animation-delay:-1.5s; }
  .ray:nth-child(7)  { transform: rotate(8deg);   width:80px;  animation-duration:4.3s; animation-delay:-2.5s; }
  .ray:nth-child(8)  { transform: rotate(18deg);  width:110px; animation-duration:6.5s; animation-delay:-0.8s; }
  .ray:nth-child(9)  { transform: rotate(30deg);  width:70px;  animation-duration:3.6s; animation-delay:-1.8s; }
  .ray:nth-child(10) { transform: rotate(42deg);  width:90px;  animation-duration:5.1s; animation-delay:-3.5s; }
  .ray:nth-child(11) { transform: rotate(52deg);  width:60px;  animation-duration:4.4s; animation-delay:-0.3s; }
  @keyframes rayPulse { from { opacity: 0.6; } to { opacity: 1.0; } }

  .gate { position: fixed; top: 0; bottom: 0; width: 60px; z-index: 3; pointer-events: none; }
  .gate-left  { left: 0; background: linear-gradient(to right, rgba(180,140,60,0.25), transparent); border-right: 1px solid rgba(220,180,80,0.15); }
  .gate-right { right: 0; background: linear-gradient(to left, rgba(180,140,60,0.25), transparent); border-left: 1px solid rgba(220,180,80,0.15); }

  .container {
    position: relative;
    z-index: 10;
    max-width: 660px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    text-align: center;
  }

  .halo {
    width: 90px; height: 90px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    background: radial-gradient(circle, rgba(255,240,150,0.55) 0%, rgba(255,210,80,0.25) 50%, transparent 75%);
    display: flex; align-items: center; justify-content: center;
    animation: haloPulse 3s ease-in-out infinite alternate;
  }
  .halo svg { width: 44px; height: 44px; }
  @keyframes haloPulse {
    from { box-shadow: 0 0 30px 10px rgba(255,220,80,0.18); }
    to   { box-shadow: 0 0 60px 20px rgba(255,220,80,0.35); }
  }

  h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 48px;
    font-weight: 400;
    color: #ffe87a;
    text-shadow: 0 0 30px rgba(255,220,80,0.7), 0 2px 4px rgba(0,0,0,0.6);
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(245,233,200,0.55);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; opacity: 0.4; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: linear-gradient(to right, transparent, rgba(220,180,80,0.8), transparent); }
  .divider span { font-size: 14px; color: #d4a840; }

  .stats { display: flex; gap: 16px; margin-bottom: 1.75rem; flex-wrap: wrap; justify-content: center; }
  .stat { font-size: 12px; color: rgba(245,233,200,0.5); font-family: 'Cinzel', serif; letter-spacing: 0.06em; }
  .stat strong { color: #f5d87a; font-weight: 600; }

  .label { font-family: 'Cinzel', serif; font-size: 10px; color: rgba(245,233,200,0.45); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; display: block; }

  .question-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .question-row input {
    flex: 1;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 15px;
    padding: 10px 14px;
    background: rgba(10,5,30,0.55);
    border: 0.5px solid rgba(220,180,80,0.35);
    border-radius: 8px;
    color: #f5e9c8;
    outline: none;
    text-align: center;
    backdrop-filter: blur(6px);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .question-row input:focus { border-color: rgba(255,210,80,0.7); box-shadow: 0 0 0 3px rgba(255,200,60,0.12); }
  .question-row input::placeholder { color: rgba(245,233,200,0.3); }
  .question-row input:disabled { opacity: 0.35; }

  button {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 8px;
    padding: 10px 18px;
    letter-spacing: 0.08em;
    transition: opacity 0.15s, background 0.15s, box-shadow 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #c8901a, #e8b830, #c8901a);
    color: #1a0800;
    border: none;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(200,140,20,0.4);
  }
  .btn-primary:hover { opacity: 0.88; box-shadow: 0 4px 20px rgba(220,160,30,0.55); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: rgba(10,5,30,0.5);
    border: 0.5px solid rgba(220,180,80,0.3);
    color: rgba(245,233,200,0.65);
    backdrop-filter: blur(4px);
  }
  .btn-secondary:hover { background: rgba(30,15,50,0.7); color: #f5e9c8; }

  .controls { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: flex-end; justify-content: center; }
  .ctrl { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .ctrl-row { display: flex; align-items: center; gap: 10px; }
  .ctrl-row input[type=range] { width: 110px; accent-color: #d4a840; }
  .ctrl-val { font-size: 13px; font-weight: 500; min-width: 36px; color: #f5d87a; font-family: 'Cinzel', serif; }
  .controls select {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    padding: 6px 8px;
    background: rgba(10,5,30,0.55);
    border: 0.5px solid rgba(220,180,80,0.35);
    border-radius: 8px;
    color: #f5e9c8;
    cursor: pointer;
    max-width: 200px;
    letter-spacing: 0.04em;
  }
  .controls select:disabled { opacity: 0.35; cursor: not-allowed; }

  .meta { font-family: 'Cinzel', serif; font-size: 10px; color: rgba(245,233,200,0.35); margin-bottom: 1rem; display: none; gap: 16px; flex-wrap: wrap; justify-content: center; letter-spacing: 0.06em; }
  .meta b { color: rgba(245,220,120,0.6); font-weight: 600; }

  .output-card {
    background: rgba(8,4,24,0.65);
    border: 0.5px solid rgba(220,180,80,0.3);
    border-radius: 14px;
    padding: 1.75rem 2rem;
    min-height: 100px;
    margin-bottom: 0.75rem;
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,220,80,0.08);
    position: relative;
    overflow: hidden;
  }
  .output-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,200,60,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .output-q { font-family: 'Cinzel', serif; font-size: 10px; color: rgba(245,220,120,0.5); margin-bottom: 14px; letter-spacing: 0.1em; text-transform: uppercase; }
  .output-text {
    font-family: 'IM Fell English', serif;
    font-size: 17px;
    line-height: 2.0;
    color: #f5e9c8;
    white-space: pre-wrap;
    word-break: break-word;
    text-align: center;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .cursor { display: inline-block; width: 2px; height: 1em; background: rgba(255,220,80,0.7); vertical-align: text-bottom; animation: blink 1s step-end infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }

  .action-row { display: flex; gap: 8px; margin-bottom: 1.5rem; justify-content: center; }
  .action-row.hidden { display: none; }

  .history { margin-top: 2rem; display: none; }
  .hist-label { font-family: 'Cinzel', serif; font-size: 10px; color: rgba(245,233,200,0.3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; display: block; text-align: center; }
  .hist-item { border-top: 0.5px solid rgba(220,180,80,0.12); padding: 8px 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; cursor: pointer; transition: background 0.15s; border-radius: 4px; }
  .hist-item:hover { background: rgba(255,200,60,0.06); }
  .hist-item:hover .hq { color: #f5d87a; }
  .hq { font-size: 13px; color: rgba(245,233,200,0.5); flex: 1; transition: color 0.15s; font-family: 'IM Fell English', serif; font-style: italic; text-align: left; }
  .hm { font-size: 10px; color: rgba(245,220,120,0.3); text-align: right; line-height: 1.6; white-space: nowrap; font-family: 'Cinzel', serif; letter-spacing: 0.04em; }

  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .mote { position: absolute; border-radius: 50%; background: rgba(255,230,120,0.7); animation: floatUp linear infinite; }
  @keyframes floatUp { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.6; } 100% { transform: translateY(-100vh) translateX(30px); opacity: 0; } }
</style>
</head>
<body>

<div class="sky"></div>
<div class="clouds">
  <div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
  <div class="cloud"></div><div class="cloud"></div>
</div>
<div class="rays">
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
  <div class="ray"></div><div class="ray"></div>
</div>
<div class="gate gate-left"></div>
<div class="gate gate-right"></div>
<div class="particles" id="ptcl"></div>

<div class="container">
  <div class="halo">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="18" stroke="rgba(255,220,80,0.6)" stroke-width="0.8"/>
      <circle cx="22" cy="22" r="12" stroke="rgba(255,220,80,0.4)" stroke-width="0.5"/>
      <path d="M22 4 L24 14 L22 12 L20 14 Z" fill="rgba(255,220,80,0.7)"/>
      <path d="M22 40 L24 30 L22 32 L20 30 Z" fill="rgba(255,220,80,0.7)"/>
      <path d="M4 22 L14 24 L12 22 L14 20 Z" fill="rgba(255,220,80,0.7)"/>
      <path d="M40 22 L30 24 L32 22 L30 20 Z" fill="rgba(255,220,80,0.7)"/>
    </svg>
  </div>

  <h1>Ask The Bible</h1>
  <p class="subtitle">Seek and ye shall receive &nbsp;·&nbsp; The word made manifest</p>
  <div class="divider"><span>✦</span></div>

  <div class="stats" id="stats" style="display:none"></div>

  <div style="margin-bottom:1rem">
    <span class="label">thy question</span>
    <div class="question-row">
      <input type="text" id="qi" placeholder="ask anything of the scripture..." disabled>
      <button class="btn-primary" id="ab" disabled>Ask</button>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl">
      <span class="label">typing speed</span>
      <div class="ctrl-row">
        <input type="range" id="sp" min="1" max="5" value="4" step="1" disabled>
        <span class="ctrl-val" id="spv">fast</span>
      </div>
    </div>
    <div class="ctrl">
      <span class="label">voice of the lord</span>
      <select id="vsel" disabled><option value="">— loading voices —</option></select>
    </div>
  </div>

  <div class="meta" id="mr">seed <b id="sv2">—</b> &nbsp; words <b id="wv">—</b> &nbsp; z-score <b id="zv">—</b></div>

  <div class="output-card" id="oc">
    <div class="output-q" id="oq"></div>
    <div class="output-text" id="ot"><span class="cursor"></span></div>
  </div>

  <div class="action-row hidden" id="ar">
    <button class="btn-secondary" id="stb" style="display:none">silence</button>
    <button class="btn-secondary" id="cb"  style="display:none">copy</button>
    <button class="btn-secondary" id="rb"  style="display:none">ask again</button>
  </div>

  <div class="history" id="hs">
    <span class="hist-label">scrolls of thy past questions</span>
    <div id="hl"></div>
  </div>
</div>

<script>
let words=[], typing=false, stopFlag=false, history=[], lastQ='', built='';
const SL=['glacial','slow','medium','fast','frantic'], SD=[110,55,22,8,1];
const MEAN=12, MIN=1, MAX=120, SIGMA=7;

const $=id=>document.getElementById(id);
const stats=$('stats'), qi=$('qi'), ab=$('ab'), sp=$('sp'), spv=$('spv'), vsel=$('vsel');
const mr=$('mr'), sv2=$('sv2'), wv=$('wv'), zv=$('zv');
const oc=$('oc'), oq=$('oq'), ot=$('ot'), ar=$('ar'), stb=$('stb'), cb=$('cb'), rb=$('rb');
const hs=$('hs'), hl=$('hl');

(function spawnMotes(){
  const c=$('ptcl');
  for(let i=0;i<22;i++){
    const m=document.createElement('div'); m.className='mote';
    const sz=Math.random()*2.5+0.8;
    m.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;animation-duration:${8+Math.random()*14}s;animation-delay:-${Math.random()*14}s;opacity:${0.4+Math.random()*0.5}`;
    c.appendChild(m);
  }
})();

let voices=[];
function populateVoices(){
  voices=speechSynthesis.getVoices();
  if(!voices.length) return;
  vsel.innerHTML='<option value="off">mute</option>';
  voices.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name+(v.lang?' ('+v.lang+')':'');vsel.appendChild(o);});
  const pref=['fred','zira','espeak','microsoft david','google uk english male'];
  let pick=0;
  for(const p of pref){const idx=voices.findIndex(v=>v.name.toLowerCase().includes(p));if(idx!==-1){pick=idx;break;}}
  vsel.value=pick;
  if(words.length) vsel.disabled=false;
}
speechSynthesis.addEventListener('voiceschanged',populateVoices);
populateVoices();

function speakWord(word){
  if(vsel.value==='off'||!voices.length) return;
  const utt=new SpeechSynthesisUtterance(word);
  const v=voices[parseInt(vsel.value)];
  if(v) utt.voice=v;
  utt.rate=0.85; utt.pitch=0.6; utt.volume=1;
  speechSynthesis.speak(utt);
}
function stopSpeech(){ speechSynthesis.cancel(); }

function hash(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h;}
function mkRand(seed){let s=seed>>>0;return()=>{s^=s<<13;s^=s>>17;s^=s<<5;s=s>>>0;return s/4294967296;};}
function boxMuller(r){const u1=Math.max(r(),1e-10),u2=r();return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);}
function sampleCount(rand,sigma){return Math.max(MIN,Math.min(MAX,Math.round(MEAN+boxMuller(rand)*sigma)));}

function loadText(text){
  words=text.split(/\s+/).filter(w=>w.length>0);
  const u=new Set(words).size;
  stats.innerHTML=`<span class="stat"><strong>${words.length.toLocaleString()}</strong> words</span><span class="stat"><strong>${u.toLocaleString()}</strong> unique</span>`;
  stats.style.display='flex';
  [qi,ab,sp].forEach(el=>el.disabled=false);
  if(voices.length) vsel.disabled=false;
  qi.focus();
}

async function loadCorpusFile(){
  try{const r=await fetch("Corpus.txt");if(!r.ok)throw new Error();loadText(await r.text());}
  catch(e){console.error(e);}
}

sp.addEventListener('input',()=>spv.textContent=SL[sp.value-1]);
qi.addEventListener('keydown',e=>{if(e.key==='Enter')ab.click();});

function generate(q){
  const seed=hash(q.trim().toLowerCase()),rand=mkRand(seed),sigma=SIGMA;
  const count=sampleCount(rand,sigma),z=((count-MEAN)/sigma).toFixed(2);
  const sel=[];
  for(let i=0;i<count;i++) sel.push(words[Math.floor(rand()*words.length)]);
  return{seed,count,z,sel};
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function typeOut(q){
  if(!words.length||typing) return;
  const{seed,count,z,sel}=generate(q);
  stopFlag=false; typing=true; lastQ=q; built='';
  oc.style.display='block'; oq.textContent='"'+q+'"'; ot.innerHTML='<span class="cursor"></span>';
  mr.style.display='flex'; sv2.textContent=seed; wv.textContent=count; zv.textContent=z+'σ';
  ar.classList.remove('hidden'); stb.style.display=''; cb.style.display='none'; rb.style.display='none';
  stopSpeech();
  const delay=SD[sp.value-1];
  for(let i=0;i<sel.length;i++){
    if(stopFlag) break;
    speakWord(sel[i]);
    for(let c=0;c<sel[i].length;c++){if(stopFlag)break;built+=sel[i][c];ot.innerHTML=built+'<span class="cursor"></span>';await sleep(delay);}
    if(!stopFlag&&i<sel.length-1){built+=' ';ot.innerHTML=built+'<span class="cursor"></span>';await sleep(delay*1.8);}
  }
  typing=false; stb.style.display='none'; cb.style.display=''; rb.style.display='';
  ot.innerHTML=built+'<span class="cursor"></span>';
}

function addHistory(q,seed,count){
  history=history.filter(h=>h.q!==q); history.unshift({q,seed,count});
  if(history.length>10) history.pop();
  hs.style.display='block'; hl.innerHTML='';
  for(const it of history){
    const d=document.createElement('div'); d.className='hist-item';
    d.innerHTML=`<span class="hq">${it.q}</span><span class="hm">seed ${it.seed}<br>${it.count} words</span>`;
    d.addEventListener('click',()=>{qi.value=it.q;typeOut(it.q);});
    hl.appendChild(d);
  }
}

ab.addEventListener('click',()=>{const q=qi.value.trim();if(!q||!words.length||typing)return;const{seed,count}=generate(q);addHistory(q,seed,count);typeOut(q);});
stb.addEventListener('click',()=>{stopFlag=true;stopSpeech();});
rb.addEventListener('click',()=>{if(!lastQ||typing)return;typeOut(lastQ);});
cb.addEventListener('click',()=>{navigator.clipboard.writeText(built.trim()).then(()=>{cb.textContent='copied!';setTimeout(()=>cb.textContent='copy',1500);});});

loadCorpusFile();
</script>
</body>
</html>
